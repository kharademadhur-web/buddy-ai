[build]
command = "pnpm run build:client"
functions = "netlify/functions"
publish = "dist/spa"

# Vite 7 expects Node ^20.19 or >=22.12
[build.environment]
NODE_VERSION = "22"


[functions]
external_node_modules = ["express"]
node_bundler = "esbuild"
[[redirects]]
force = true
from = "/api/*"
status = 200
to = "/.netlify/functions/api/:splat"
