# Deploy Node.js app to Azure App Service (Linux).
# Produces Linux-native node_modules on ubuntu-latest, then uploads dist/ + server bundle.
#
# Required repository secrets:
#   AZURE_WEBAPP_PUBLISH_PROFILE  — from Azure Portal → App Service → Download publish profile (entire XML file)
#   VITE_SUPABASE_URL             — Supabase project URL (client build)
#   VITE_SUPABASE_ANON_KEY        — Supabase anon key (client build)
#
# Optional:
#   VITE_API_URL                  — Leave unset for same-origin /api; set only for split API host
#
# App Service should have Startup Command: node dist/server/node-build.mjs
# Set SCM_DO_BUILD_DURING_DEPLOYMENT=false to avoid Oryx overwriting this deploy.
#
# Optional repository variable: AZURE_WEBAPP_NAME (defaults to buddyai-app if unset)

name: Deploy Azure Web App

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      app_name:
        description: Azure App Service name (leave default to use repo variable or buddyai-app)
        required: false
        default: ""

concurrency:
  group: azure-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build client and server
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: pnpm build

      # Do NOT run API smoke here against localhost — nothing listens on :8080 in CI, so this always fails
      # if SMOKE_* secrets are set. Run `pnpm smoke:saas-core` locally or add a separate job that hits a
      # deployed URL (set vars.SMOKE_BASE_URL to your App Service URL) after deploy.

      - name: Stage deploy folder with Linux node_modules
        run: |
          mkdir -p deploy
          cp -r dist package.json deploy/
          cd deploy
          npm install --omit=dev --legacy-peer-deps

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.app_name != '' && github.event.inputs.app_name || vars.AZURE_WEBAPP_NAME || 'buddyai-app' }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy
